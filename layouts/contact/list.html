{{ define "main" }}
<h1>{{ .Title }}</h1>
{{ .Content }}
<ul class="contact-links">
  {{ with .Params.email }}<li><a href="mailto:{{ . }}">{{ . }}</a></li>{{ end }}
  {{ with .Params.linkedin }}<li><a href="{{ . }}">LinkedIn</a></li>{{ end }}
  {{ with .Params.github }}<li><a href="{{ . }}">GitHub</a></li>{{ end }}
  {{ with .Params.scholar }}<li><a href="{{ . }}">Google Scholar</a></li>{{ end }}
</ul>
{{ end }}
