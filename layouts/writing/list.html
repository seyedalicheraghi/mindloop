{{ define "main" }}
<h1>{{ .Title }}</h1>
{{ .Content }}
<ul class="writing-list">
  {{ range .Site.Data.writing }}
  <li class="writing-item">
    <div>
      <a href="{{ .url }}">{{ .title }}</a>
      {{ with .authors }}<p class="writing-item__authors">{{ . }}</p>{{ end }}
    </div>
    <span class="writing-item__meta">{{ .venue }} · {{ .date }}{{ with .citations }} · {{ . }} citations{{ end }}</span>
  </li>
  {{ end }}
</ul>
{{ end }}
